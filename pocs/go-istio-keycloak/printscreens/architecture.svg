<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Comic Sans MS','Segoe Print','Bradley Hand',cursive">
  <defs>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.2"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6472"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="560" fill="#fbfaf7"/>
  <text x="480" y="46" font-size="30" text-anchor="middle" fill="#3a4250">Book Service — JWT via Istio + Keycloak</text>

  <g filter="url(#wobble)">
    <rect x="40" y="120" width="150" height="90" rx="14" fill="#d7ecfb" stroke="#5b6472" stroke-width="2.5"/>
    <rect x="270" y="100" width="220" height="340" rx="16" fill="#fef3d7" stroke="#5b6472" stroke-width="2.5"/>
    <rect x="300" y="150" width="160" height="80" rx="12" fill="#ffe3e3" stroke="#5b6472" stroke-width="2.5"/>
    <rect x="300" y="330" width="160" height="80" rx="12" fill="#e5f7e0" stroke="#5b6472" stroke-width="2.5"/>
    <rect x="600" y="150" width="180" height="90" rx="14" fill="#d7ecfb" stroke="#5b6472" stroke-width="2.5"/>
    <rect x="600" y="330" width="180" height="90" rx="14" fill="#e8e2fb" stroke="#5b6472" stroke-width="2.5"/>
    <rect x="820" y="230" width="110" height="90" rx="14" fill="#fde4c4" stroke="#5b6472" stroke-width="2.5"/>
  </g>

  <g font-size="18" fill="#3a4250" text-anchor="middle">
    <text x="115" y="160">Client</text>
    <text x="115" y="184">Bearer JWT</text>
    <text x="380" y="128" font-size="16">Istio mesh</text>
    <text x="380" y="185">Ingress GW</text>
    <text x="380" y="207" font-size="14">RequestAuth</text>
    <text x="380" y="368">Envoy</text>
    <text x="380" y="390" font-size="14">sidecar</text>
    <text x="690" y="190">SQLite</text>
    <text x="690" y="214" font-size="15">books.db</text>
    <text x="690" y="378">Book Service</text>
    <text x="690" y="400" font-size="14">Gin / Go</text>
    <text x="875" y="266">Keycloak</text>
    <text x="875" y="286" font-size="12">in-cluster</text>
    <text x="875" y="304" font-size="12">OIDC / JWKS</text>
  </g>

  <g fill="none" stroke="#5b6472" stroke-width="2.4" marker-end="url(#arrow)">
    <path d="M192 165 C 235 165, 250 180, 298 185"/>
    <path d="M380 232 C 380 270, 380 295, 380 326"/>
    <path d="M462 370 C 520 370, 545 375, 598 375"/>
    <path d="M690 328 C 690 300, 690 280, 690 242"/>
    <path d="M460 155 C 580 85, 800 85, 878 226" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  </g>

  <g font-size="13" fill="#5b6472" font-style="italic">
    <text x="235" y="150">HTTPS</text>
    <text x="392" y="290">validated</text>
    <text x="500" y="360">X-Auth-User</text>
    <text x="640" y="292">query</text>
    <text x="640" y="82" text-anchor="middle">fetch JWKS keys</text>
  </g>
</svg>
