apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: book-service
  labels:
    app: book-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
        - name: book-service
          image: localhost/book-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_PATH
              value: "/data/books.db"
            - name: AUTH_HEADER
              value: "X-Auth-User"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: book-service
  namespace: book-service
  labels:
    app: book-service
spec:
  selector:
    app: book-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
